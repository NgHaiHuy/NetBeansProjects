<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #f0f9ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 24px;
        }
        
        .display-container {
            margin-bottom: 20px;
        }
        
        .display-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: right;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background-color: #f9fafb;
            color: #1f2937;
            outline: none;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn-calc {
            padding: 15px 0;
            font-size: 18px;
            font-weight: 500;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background-color: white;
            color: #1f2937;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-calc:hover {
            background-color: #f3f4f6;
        }
        
        .btn-op {
            background-color: #f3f4f6;
            font-weight: 600;
        }
        
        .btn-op:hover {
            background-color: #e5e7eb;
        }
        
        .btn-submit {
            grid-column: span 2;
            background-color: #1f2937;
            color: white;
            border: none;
        }
        
        .btn-submit:hover {
            background-color: #111827;
        }
        
        .btn-clear {
            grid-column: span 2;
            background-color: #ef4444;
            color: white;
            border: none;
        }
        
        .btn-clear:hover {
            background-color: #dc2626;
        }
        
        .btn-home {
            margin-top: 20px;
            display: block;
            text-decoration: none;
            color: #6b7280;
            font-size: 14px;
        }
        
        .btn-home:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h2>Calculator</h2>
        
        <form id="calcForm">
            <div class="display-container">
                <input type="text" id="display" name="expression" class="display-input" readonly placeholder="0">
            </div>
            
            <div class="calc-grid">
                <button type="button" class="btn-calc btn-clear" onclick="clearDisplay()">C</button>
                <button type="button" class="btn-calc btn-op" onclick="appendOp('%')">%</button>
                <button type="button" class="btn-calc btn-op" onclick="appendOp('/')">/</button>
                
                <button type="button" class="btn-calc" onclick="appendNum('7')">7</button>
                <button type="button" class="btn-calc" onclick="appendNum('8')">8</button>
                <button type="button" class="btn-calc" onclick="appendNum('9')">9</button>
                <button type="button" class="btn-calc btn-op" onclick="appendOp('x')">x</button>
                
                <button type="button" class="btn-calc" onclick="appendNum('4')">4</button>
                <button type="button" class="btn-calc" onclick="appendNum('5')">5</button>
                <button type="button" class="btn-calc" onclick="appendNum('6')">6</button>
                <button type="button" class="btn-calc btn-op" onclick="appendOp('-')">-</button>
                
                <button type="button" class="btn-calc" onclick="appendNum('1')">1</button>
                <button type="button" class="btn-calc" onclick="appendNum('2')">2</button>
                <button type="button" class="btn-calc" onclick="appendNum('3')">3</button>
                <button type="button" class="btn-calc btn-op" onclick="appendOp('+')">+</button>
                
                <button type="button" class="btn-calc" onclick="appendNum('0')" style="grid-column: span 2;">0</button>
                <button type="submit" class="btn-calc btn-submit">=</button>
            </div>
        </form>
        
        <a href="index.html" class="btn-home">Back to Home</a>
    </div>

    <script>
        const display = document.getElementById('display');
        let currentExp = "";
        
        function updateDisplay() {
            display.value = currentExp || "0";
        }
        
        function appendNum(num) {
            currentExp += num;
            updateDisplay();
        }
        
        function appendOp(op) {
            if(currentExp.length > 0) {
                const lastChar = currentExp.slice(-1);
                if(lastChar !== '+' && lastChar !== '-' && lastChar !== 'x' && lastChar !== '/' && lastChar !== '%') {
                    currentExp += op;
                    updateDisplay();
                }
            }
        }
        
        function clearDisplay() {
            currentExp = "";
            updateDisplay();
        }
        
        document.getElementById("calcForm").addEventListener("submit", function(e) {
            e.preventDefault();
            fetch("calcuServlet", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams(new FormData(this))
            })
            .then(res => res.text())
            .then(text => {
                display.value = text;
                currentExp = text; 
            })
            .catch(err => {
                display.value = "Error";
                currentExp = "";
            });
        });
    </script>
</body>
</html>
